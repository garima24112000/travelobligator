services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelobligator_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travelobligator_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

  postgres:
    image: postgres:16
    container_name: travelobligator_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - travelobligator_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: travelobligator_redis
    ports:
      - "6379:6379"
    volumes:
      - travelobligator_redis_data:/data

volumes:
  travelobligator_postgres_data:
  travelobligator_redis_data: